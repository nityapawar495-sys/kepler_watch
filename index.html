<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img src="photu.png" alt="Kepler Watch Logo" class="logo">
        <!-- <h1>Kepler Watch</h1> -->
    </div>
    <h1>SpaceX Mission Control</h1>
    <div class="controls">
        <!-- For Search -->
         <input type="text" id="search" placeholder="Search missions....">
         <button onclick="toggleTheme()">Toggle Mode 🌗</button>
        <!-- Filter -->
        <button onclick="filterMissions('all')">All</button>
        <button onclick="filterMissions('success')">Success</button>
        <button onclick="filterMissions('failed')">Failed</button>
        <button onclick="filterMissions('upcoming')">Upcoming</button>

         <!-- Sort -->
        <button onclick="sortByFlight()">Sort by Flight</button>

    </div>
    <div id="load">Loading Missions...</div>
    <div id="missions"></div>
    <script src="script.js"></script>
</body>
</html>
